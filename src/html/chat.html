<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/global.css">
    <!-- <link rel="stylesheet" href="../css/index.css"> -->
    <link rel="stylesheet" href="../css/chat.css">
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet"> -->

    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Roboto:wght@100&display=swap" rel="stylesheet">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.js" integrity="sha512-nO7wgHUoWPYGCNriyGzcFwPSF+bPDOR+NvtOYy2wMcWkrnCNPKBcFEkU80XIN14UVja0Gdnff9EmydyLlOL7mQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../js/menu.js" defer></script>
    <script src="../js/nav-icon.js" defer></script>

    <title>Chat - BeliSkuy</title>
</head>
<body>
    <header>
        <div id="left">
            <img src="../../assets/gallery/logo.svg" id="logo">
            <a href="./cart.html"><img src="../../assets/gallery/shopping-cart.svg" class="nav-icon" id="cart"></a>
            <a href="./chat.html"><img src="../../assets/gallery/chat-bubble.svg" class="nav-icon" id="chat"></a>
        </div>

        <nav>
            <ul>
                <a href="./gallery.html"><li>Gallery</li></a>
                <a href="./register.html"><li class="active">Register</li></a>
                <a href="./profile.html"><li>Profile</li></a>
            </ul>
        </nav>
        
        <div class="bx bx-menu" id="menu"></div>
    </header>

    <div id="overlay"></div>

    <div id="content">
       <div class="inbox">
            <h3>Inbox</h3>
            <div class="text">
                <p>Chat</p>
                <div class="notif br-10">
                    <p>20</p>
                </div>
            </div>
            <div class="text">
                <p>Discussion</p>
                <div class="notif">
                    <p>1</p>
                </div>
            </div>
            <div class="text">
                <p>Review</p>
                <div class="notif">
                    <p>5</p>
                </div>
            </div>
            <div class="text">
                <p>Helpdesk</p>
                <div class="notif">
                    <p>8</p>
                </div>
            </div>
            <div class="text">
                <p>Prodict Complain</p>
                <div class="notif">
                    <p>1</p>
                </div>
            </div>
       </div>
       <div class="chat">
            <h2>Chat</h2>
            <div class="chat-box">
                <header>
                    <img src="../../assets/chat/admin.png" alt="">
                    <div class="name">
                        <h3>Admin</h3>
                        <p>Last online 1 minute ago</p>
                    </div>
                </header>
                <div class="blank"></div>
                <div class="message1">
                    <p>Hello admin!</p>
                </div>
                <div class="message2">
                    <p>How can i help you?</p>
                </div>
                <div class="type">
                    <div class="input">
                        <input type="text" placeholder="Type a message...">
                    </div>
                    <div class="button">
                        <img src="../../assets/chat/send.png" alt="">
                    </div>
                </div>
            </div>
       </div>
    </div>

    <footer>
        <p>Copyright 2022 &copy; BeliSkuy</p>

        <div id="social-media">
            <a href="https://instagram.com"><img src="../../assets/gallery/instagram.svg"></a>
            <a href="https://facebook.com"><img src="../../assets/gallery/facebook.svg"></a>
            <a href="https://twitter.com"><img src="../../assets/gallery/twitter.svg"></a>
            <a href="https://tiktok.com"><img src="../../assets/gallery/tiktok.svg"></a>
        </div>
    </footer>
</body>
</html>
