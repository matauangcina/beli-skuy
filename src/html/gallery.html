<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/gallery.css">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.js" integrity="sha512-nO7wgHUoWPYGCNriyGzcFwPSF+bPDOR+NvtOYy2wMcWkrnCNPKBcFEkU80XIN14UVja0Gdnff9EmydyLlOL7mQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../js/carousel.js" defer></script>
    <script src="../js/menu.js" defer></script>
    <script src="../js/nav-icon.js" defer></script>

    <title>Gallery - BeliSkuy</title>
</head>
<body>
    <header>
        <div id="left">
            <img src="../../assets/gallery/logo.svg" id="logo">
            <a href="./cart.html"><img src="../../assets/gallery/shopping-cart.svg" class="nav-icon" id="cart"></a>
            <a href="./chat.html"><img src="../../assets/gallery/chat-bubble.svg" class="nav-icon" id="chat"></a>
        </div>

        <nav>
            <ul>
                <a href="./gallery.html"><li class="active">Gallery</li></a>
                <a href="./register.html"><li>Register</li></a>
                <a href="./profile.html"><li>Profile</li></a>
            </ul>
        </nav>

        <div class="bx bx-menu" id="menu"></div>
    </header>

    <div id="overlay"></div>

    <div id="content">
        <div id="top">
            <p>BeliSkuy</p>
            <p>Looking fashionable has never been more easy.</p>
        </div>

        <div id="mid">
            <div class="container">
                <div id="carousel">
                    <div id="slides">
                        <div class="slider active">
                            <img src="../../assets/gallery/image-slider-1.svg">
                        </div>
                        <div class="slider">
                            <img src="../../assets/gallery/image-slider-2.svg">
                        </div>
                        <div class="slider">
                            <img src="../../assets/gallery/image-slider-3.svg">
                        </div>
                    </div>
                    <div id="slide-nav">
                        <div class="navigate active"></div>
                        <div class="navigate"></div>
                        <div class="navigate"></div>
                    </div>
                </div>
                <div id="categories">
                    <div class="category">
                        <img src="../../assets/gallery/all.svg">
                        <p>All</p>
                    </div>
                    <div class="category">
                        <img src="../../assets/gallery/shoes.svg">
                        <p>Shoes</p>
                    </div>
                    <div class="category">
                        <img src="../../assets/gallery/pants.svg">
                        <p>Pants</p>
                    </div>
                    <div class="category">
                        <img src="../../assets/gallery/clothes.svg">
                        <p>Clothes</p>
                    </div>
                </div>
                <div id="latest-product">
                    <div id="text">
                        <h1>Latest Products</h1>
                        <a href="">View More</a>
                    </div>
                    <div id="product-list">
                        <div id="container">
                            <div class="product">
                                <img src="../../assets/gallery/gray-shorts.svg">
                                <p>Shorts</p>
                            </div>
                            <div class="product">
                                <img src="../../assets/gallery/airmax.svg">
                                <p>Running Shoes</p>
                            </div>
                            <div class="product">
                                <img src="../../assets/gallery/peach-blouse.svg">
                                <p>Peach Blouse</p>
                            </div>
                            <div class="product">
                                <img src="../../assets/gallery/beige-hoodie.svg">
                                <p>Beige Hoodie</p>
                            </div>
                            <div class="product">
                                <img src="../../assets/gallery/gray-shorts.svg">
                                <p>Shorts</p>
                            </div>
                            <div class="product">
                                <img src="../../assets/gallery/airmax.svg">
                                <p>Running Shoes</p>
                            </div>
                            <div class="product">
                                <img src="../../assets/gallery/peach-blouse.svg">
                                <p>Peach Blouse</p>
                            </div>
                            <div class="product">
                                <img src="../../assets/gallery/beige-hoodie.svg">
                                <p>Beige Hoodie</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Copyright 2022 &copy; BeliSkuy</p>

        <div id="social-media">
            <a href="https://instagram.com"><img src="../../assets/gallery/instagram.svg"></a>
            <a href="https://facebook.com"><img src="../../assets/gallery/facebook.svg"></a>
            <a href="https://twitter.com"><img src="../../assets/gallery/twitter.svg"></a>
            <a href="https://tiktok.com"><img src="../../assets/gallery/tiktok.svg"></a>
        </div>
    </footer>
</body>
</html>
